name: bitebloom
description: "BiteBloom - AI-powered calorie and macro tracking app"
publish_to: 'none'
version: 1.1.2+6

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  dio: ^5.7.0
  firebase_analytics: ^12.4.2
  firebase_app_check: ^0.4.4+2
  google_sign_in: ^7.2.0

  # AI (using Gemini REST API via Dio)

  # UI & Animations
  flutter_animate: ^4.5.2
  fl_chart: ^0.69.2
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  confetti: ^0.8.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Camera & Images
  camera: ^0.11.1
  image_picker: ^1.1.2
  image: ^4.5.3

  # Utils
  flutter_dotenv: ^5.2.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  logger: ^2.7.0
  mobile_scanner: ^7.2.0
  shared_preferences: ^2.5.5
  share_plus: ^13.1.0
  flutter_local_notifications: ^22.0.0-dev.3
  timezone: ^0.11.0
  webview_flutter: ^4.13.1
  firebase_ai: ^3.12.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/






